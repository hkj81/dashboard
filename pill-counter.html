<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>💊 알약 카운터</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f172a;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            background: #1e293b;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
            flex-shrink: 0;
        }
        .header-sub  { font-size: 11px; color: #64748b; }
        .header-title { font-size: 18px; font-weight: 700; margin-top: 1px; }
        .history-chip {
            background: #0f172a;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 11px;
            color: #94a3b8;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── Camera ── */
        .camera-wrap {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #resultCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        /* Guide overlay */
        .guide-wrap {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .guide-label {
            font-size: 12px;
            color: rgba(255,255,255,0.65);
            background: rgba(0,0,0,0.45);
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        .guide-rect {
            width: 82%;
            height: 55%;
            border: 2px dashed rgba(255,255,255,0.35);
            border-radius: 16px;
        }

        /* Result count badge */
        .result-badge {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15,23,42,0.93);
            border: 1.5px solid #22c55e;
            border-radius: 22px;
            padding: 14px 44px;
            text-align: center;
            display: none;
            backdrop-filter: blur(12px);
        }
        .result-num  { font-size: 56px; font-weight: 800; color: #22c55e; line-height: 1; }
        .result-sub  { font-size: 13px; color: #94a3b8; margin-top: 3px; }

        /* Processing spinner */
        .proc-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 14px;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .proc-text { font-size: 14px; color: rgba(255,255,255,0.85); }

        /* ── Bottom panel ── */
        .bottom {
            background: #1e293b;
            padding: 14px 16px 20px;
            flex-shrink: 0;
            border-top: 1px solid #334155;
        }

        .status-bar {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            min-height: 16px;
            margin-bottom: 12px;
        }

        /* Background toggle */
        .bg-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .bg-btn {
            flex: 1;
            padding: 8px 4px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .bg-btn.active {
            background: #1d4ed8;
            border-color: #3b82f6;
            color: #fff;
        }

        /* Action buttons */
        .action-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 14px;
        }
        .btn-side {
            width: 54px; height: 54px;
            border-radius: 50%;
            border: 1px solid #334155;
            background: #0f172a;
            color: #94a3b8;
            font-size: 22px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-side:active { background: #334155; }
        .btn-capture {
            width: 74px; height: 74px;
            border-radius: 50%;
            border: 5px solid #22c55e;
            background: #fff;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-capture:active { transform: scale(0.90); }

        /* Size slider */
        .size-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .size-lbl { font-size: 11px; color: #64748b; white-space: nowrap; }
        input[type=range] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #334155;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px; height: 22px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
        }
        .size-val { font-size: 11px; color: #94a3b8; min-width: 32px; text-align: right; }

        /* History modal */
        .modal-bg {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: flex-end;
            z-index: 100;
        }
        .modal-box {
            background: #1e293b;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            width: 100%;
            max-height: 60dvh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 16px; font-weight: 700;
            margin-bottom: 14px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
            font-size: 14px;
        }
        .history-item:last-child { border-bottom: none; }
        .history-count { font-size: 22px; font-weight: 700; color: #22c55e; }
        .history-time { font-size: 11px; color: #64748b; }
        .modal-close {
            display: block; width: 100%; margin-top: 14px;
            padding: 12px;
            background: #0f172a; border: none; border-radius: 12px;
            color: #94a3b8; font-size: 14px; cursor: pointer;
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <div>
        <div class="header-sub">태전그룹 · 도매 시스템</div>
        <div class="header-title">💊 알약 카운터</div>
    </div>
    <div class="history-chip" id="historyChip" onclick="openHistory()" style="cursor:pointer">
        기록 없음
    </div>
</header>

<!-- Camera area -->
<div class="camera-wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="resultCanvas"></canvas>

    <div class="guide-wrap" id="guideWrap">
        <div class="guide-label">알약을 이 영역 안에 고르게 펼쳐주세요</div>
        <div class="guide-rect"></div>
    </div>

    <div class="result-badge" id="resultBadge">
        <div class="result-num" id="resultNum">0</div>
        <div class="result-sub">개 감지됨</div>
    </div>

    <div class="proc-overlay" id="procOverlay">
        <div class="spinner"></div>
        <div class="proc-text">분석 중...</div>
    </div>
</div>

<!-- Bottom controls -->
<div class="bottom">
    <div class="status-bar" id="statusBar">카메라를 시작하는 중...</div>

    <div class="bg-row">
        <button class="bg-btn active" id="bgDark" onclick="setBg('dark')">🌑 어두운 배경 (권장)</button>
        <button class="bg-btn" id="bgLight" onclick="setBg('light')">⬜ 밝은 배경</button>
    </div>

    <div class="action-row">
        <button class="btn-side" onclick="retake()" title="다시 찍기">↩</button>
        <button class="btn-capture" id="captureBtn" onclick="handleCapture()">📷</button>
        <button class="btn-side" onclick="saveCount()" title="기록 저장">💾</button>
    </div>

    <div class="size-row">
        <span class="size-lbl">알약 크기</span>
        <input type="range" id="sizeSlider" min="1" max="10" value="5" oninput="updateSizeLbl()">
        <span class="size-val" id="sizeVal">중</span>
    </div>
</div>

<!-- Hidden process canvas -->
<canvas id="processCanvas" style="display:none"></canvas>

<!-- History modal -->
<div class="modal-bg" id="modalBg" onclick="closeHistory(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">📋 카운팅 기록</div>
        <div id="historyList"></div>
        <button class="modal-close" onclick="closeHistory()">닫기</button>
    </div>
</div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
const video        = document.getElementById('video');
const resultCanvas = document.getElementById('resultCanvas');
const processCanvas= document.getElementById('processCanvas');

let bgMode   = 'dark';
let captured = false;
let lastCount= null;
let history  = JSON.parse(localStorage.getItem('pillCountHistory') || '[]');

updateHistoryChip();

// ─────────────────────────────────────────────
// Camera
// ─────────────────────────────────────────────
async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 } }
        });
        video.srcObject = stream;
        await video.play();
        setStatus('촬영 버튼을 눌러 알약 개수를 분석하세요');
    } catch(e) {
        setStatus('❌ 카메라 권한을 허용해주세요 (브라우저 주소창 → 자물쇠 아이콘)');
    }
}

// ─────────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────────
function setStatus(msg) {
    document.getElementById('statusBar').textContent = msg;
}

function setBg(mode) {
    bgMode = mode;
    document.getElementById('bgDark').classList.toggle('active', mode === 'dark');
    document.getElementById('bgLight').classList.toggle('active', mode === 'light');
}

const SIZE_LABELS = ['극소','소','소중','중소','중','중대','대','대형','특대','최대'];
function updateSizeLbl() {
    const v = parseInt(document.getElementById('sizeSlider').value);
    document.getElementById('sizeVal').textContent = SIZE_LABELS[v - 1] || '중';
}

function retake() {
    captured = false;
    lastCount = null;
    document.getElementById('resultBadge').style.display = 'none';
    document.getElementById('guideWrap').style.display  = 'flex';
    resultCanvas.style.display = 'none';
    const ctx = resultCanvas.getContext('2d');
    ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
    setStatus('다시 촬영해주세요');
}

function saveCount() {
    if (!captured || lastCount === null) { setStatus('먼저 촬영 후 저장하세요'); return; }
    const now = new Date();
    const ts  = now.toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    history.unshift({ time: ts, count: lastCount });
    if (history.length > 20) history.pop();
    localStorage.setItem('pillCountHistory', JSON.stringify(history));
    updateHistoryChip();
    setStatus(`✅ ${lastCount}개 기록 저장됨`);
}

function updateHistoryChip() {
    const chip = document.getElementById('historyChip');
    if (history.length === 0) { chip.textContent = '기록 없음'; return; }
    chip.textContent = '최근: ' + history.slice(0,3).map(h => h.count + '개').join(', ');
}

function openHistory() {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
        list.innerHTML = '<div style="color:#64748b;text-align:center;padding:20px">기록이 없습니다</div>';
    } else {
        list.innerHTML = history.map(h => `
            <div class="history-item">
                <span class="history-count">${h.count}개</span>
                <span class="history-time">${h.time}</span>
            </div>
        `).join('');
    }
    document.getElementById('modalBg').style.display = 'flex';
}
function closeHistory(e) {
    document.getElementById('modalBg').style.display = 'none';
}

// ─────────────────────────────────────────────
// Capture
// ─────────────────────────────────────────────
function handleCapture() {
    if (captured) { retake(); return; }
    if (!video.videoWidth) { setStatus('카메라가 아직 준비되지 않았습니다'); return; }

    document.getElementById('procOverlay').style.display = 'flex';
    document.getElementById('guideWrap').style.display   = 'none';

    // Give spinner time to render before heavy JS
    requestAnimationFrame(() => setTimeout(() => {
        try {
            doCapture();
        } catch(e) {
            setStatus('오류: ' + e.message);
            console.error(e);
            document.getElementById('procOverlay').style.display = 'none';
            document.getElementById('guideWrap').style.display   = 'flex';
        }
    }, 80));
}

function doCapture() {
    const vw = video.videoWidth, vh = video.videoHeight;

    // Scale for processing (max 800px on longer side = fast enough)
    const MAX_PROC = 800;
    const pScale = Math.min(MAX_PROC / vw, MAX_PROC / vh, 1);
    const pw = Math.round(vw * pScale), ph = Math.round(vh * pScale);

    processCanvas.width  = pw;
    processCanvas.height = ph;
    processCanvas.getContext('2d').drawImage(video, 0, 0, pw, ph);

    // Result canvas at reasonable display size
    const MAX_RES = Math.min(vw, 1920);
    const rScale  = MAX_RES / vw;
    resultCanvas.width  = Math.round(vw * rScale);
    resultCanvas.height = Math.round(vh * rScale);
    resultCanvas.style.display = 'block';

    const count = processImage(pw, ph);
    lastCount = count;

    document.getElementById('resultNum').textContent      = count;
    document.getElementById('resultBadge').style.display  = 'block';
    document.getElementById('procOverlay').style.display  = 'none';

    if (count === 0) {
        setStatus('감지 실패 — 배경 설정을 바꾸거나 크기 슬라이더를 조정해보세요');
    } else {
        setStatus(`✅ 총 ${count}개 감지됨 · 💾 버튼으로 기록 저장`);
    }
    captured = true;
}

// ─────────────────────────────────────────────
// Image processing pipeline
// ─────────────────────────────────────────────
function processImage(pw, ph) {
    const ctx     = processCanvas.getContext('2d');
    const imgData = ctx.getImageData(0, 0, pw, ph);
    const d       = imgData.data;

    // 1) Grayscale
    const gray = new Uint8Array(pw * ph);
    for (let i = 0; i < gray.length; i++) {
        gray[i] = (d[i*4]*77 + d[i*4+1]*150 + d[i*4+2]*29) >> 8;
    }

    // 2) Gaussian blur 5×5
    const blurred = gaussBlur5(gray, pw, ph);

    // 3) Otsu threshold
    const thresh = otsu(blurred);

    // 4) Binary: 1 = pill
    const binary = new Uint8Array(pw * ph);
    if (bgMode === 'dark') {
        // Pills brighter than dark background
        for (let i = 0; i < binary.length; i++) binary[i] = blurred[i] > thresh ? 1 : 0;
    } else {
        // Pills darker than bright background
        for (let i = 0; i < binary.length; i++) binary[i] = blurred[i] < thresh ? 1 : 0;
    }

    // 5) Erosion (separate touching pills)
    const sl = parseInt(document.getElementById('sizeSlider').value);
    const erosionPasses = sl <= 3 ? 1 : sl <= 7 ? 2 : 3;
    let proc = binary;
    for (let i = 0; i < erosionPasses; i++) proc = erode(proc, pw, ph);

    // 6) Find blobs
    const areaTable = [150, 320, 550, 850, 1250, 1800, 2600, 3800, 5500, 8000];
    const baseArea  = areaTable[sl - 1] || 1250;
    const blobs     = findBlobs(proc, pw, ph, baseArea * 0.2, baseArea * 6);

    // 7) Draw results
    drawResults(blobs, pw, ph);

    return blobs.length;
}

// ─────────────────────────────────────────────
// Algorithms
// ─────────────────────────────────────────────

/** 5×5 Gaussian blur */
function gaussBlur5(gray, w, h) {
    const K   = [2,4,5,4,2, 4,9,12,9,4, 5,12,15,12,5, 4,9,12,9,4, 2,4,5,4,2];
    const KS  = 159;
    const out = new Uint8Array(w * h);
    for (let y = 2; y < h - 2; y++) {
        for (let x = 2; x < w - 2; x++) {
            let s = 0, k = 0;
            for (let dy = -2; dy <= 2; dy++)
                for (let dx = -2; dx <= 2; dx++)
                    s += gray[(y+dy)*w + (x+dx)] * K[k++];
            out[y*w+x] = (s / KS) | 0;
        }
    }
    return out;
}

/** Otsu's automatic threshold */
function otsu(gray) {
    const hist = new Int32Array(256);
    for (let i = 0; i < gray.length; i++) hist[gray[i]]++;
    const N = gray.length;
    let sum = 0;
    for (let i = 0; i < 256; i++) sum += i * hist[i];
    let sB = 0, wB = 0, best = 0, thresh = 128;
    for (let t = 0; t < 256; t++) {
        wB += hist[t]; if (!wB) continue;
        const wF = N - wB; if (!wF) break;
        sB += t * hist[t];
        const mB = sB / wB, mF = (sum - sB) / wF;
        const v = wB * wF * (mB - mF) * (mB - mF);
        if (v > best) { best = v; thresh = t; }
    }
    return thresh;
}

/** Single-pass erosion (4-connected) */
function erode(b, w, h) {
    const r = new Uint8Array(b);
    for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
            const i = y*w+x;
            if (b[i] && (!b[i-1] || !b[i+1] || !b[i-w] || !b[i+w])) r[i] = 0;
        }
    }
    return r;
}

/** BFS blob detection with area + shape filtering */
function findBlobs(bin, w, h, minA, maxA) {
    const vis = new Uint8Array(w * h);
    // Pre-allocated queue (avoids array.shift() slowness)
    const qx  = new Int16Array(w * h);
    const qy  = new Int16Array(w * h);
    const blobs = [];

    for (let sy = 0; sy < h; sy++) {
        for (let sx = 0; sx < w; sx++) {
            const si = sy*w+sx;
            if (vis[si] || !bin[si]) continue;

            let head = 0, tail = 0;
            qx[tail] = sx; qy[tail] = sy; tail++;
            vis[si] = 1;

            let area = 0, cx = 0, cy = 0;
            let x0 = sx, x1 = sx, y0 = sy, y1 = sy;

            while (head < tail) {
                const px = qx[head], py = qy[head]; head++;
                area++; cx += px; cy += py;
                if (px < x0) x0 = px; if (px > x1) x1 = px;
                if (py < y0) y0 = py; if (py > y1) y1 = py;

                const NX = [px-1, px+1, px,   px  ];
                const NY = [py,   py,   py-1, py+1 ];
                for (let k = 0; k < 4; k++) {
                    const nx = NX[k], ny = NY[k];
                    if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                        const ni = ny*w+nx;
                        if (!vis[ni] && bin[ni]) {
                            vis[ni] = 1;
                            qx[tail] = nx; qy[tail] = ny; tail++;
                        }
                    }
                }
            }

            if (area < minA || area > maxA) continue;

            const bw = x1 - x0 + 1, bh = y1 - y0 + 1;

            // Filter: not too elongated
            const aspect = Math.max(bw, bh) / Math.max(Math.min(bw, bh), 1);
            if (aspect > 5) continue;

            // Filter: not too hollow
            const fill = area / (bw * bh);
            if (fill < 0.18) continue;

            blobs.push({
                cx: Math.round(cx / area),
                cy: Math.round(cy / area),
                r:  Math.round(Math.sqrt(area / Math.PI)),
                area
            });
        }
    }
    return blobs;
}

// ─────────────────────────────────────────────
// Draw results onto resultCanvas
// ─────────────────────────────────────────────
function drawResults(blobs, pw, ph) {
    const rw  = resultCanvas.width;
    const rh  = resultCanvas.height;
    const ctx = resultCanvas.getContext('2d');
    const sx  = rw / pw;
    const sy  = rh / ph;

    // Draw captured photo
    ctx.drawImage(processCanvas, 0, 0, rw, rh);

    // Draw circle + number for each detected pill
    blobs.forEach((b, i) => {
        const x  = b.cx * sx;
        const y  = b.cy * sy;
        const r  = Math.max(b.r * (sx + sy) / 2 + 5, 16);

        // Filled circle
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(34,197,94,0.20)';
        ctx.fill();

        // Border
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth   = Math.max(2.5, r * 0.1);
        ctx.stroke();

        // Number label
        const fs = Math.max(11, r * 0.65);
        ctx.font          = `bold ${fs}px -apple-system, sans-serif`;
        ctx.textAlign     = 'center';
        ctx.textBaseline  = 'middle';

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillText(i + 1, x + 1, y + 1);
        // Label
        ctx.fillStyle = '#ffffff';
        ctx.fillText(i + 1, x, y);
    });
}

// ─────────────────────────────────────────────
// Start
// ─────────────────────────────────────────────
startCamera();
</script>
</body>
</html>
